workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build

    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      # Codemagic 환경 그룹 'ocl-firebase' 에 다음 키를 등록하세요:
      #   VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN,
      #   VITE_FIREBASE_PROJECT_ID, VITE_FIREBASE_STORAGE_BUCKET,
      #   VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID,
      #   VITE_FIREBASE_MEASUREMENT_ID, VITE_NEIS_API_KEY, VITE_GEMINI_API_KEY
      groups:
        - ocl-firebase

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v

      - name: Write .env.production from Codemagic env
        script: |
          # VITE_* 변수가 빌드 시 비어 있으면 Firebase initializeApp 이 실패해
          # 흰 화면을 만든다. 따라서 vite build 직전에 .env.production 을 명시적으로 생성한다.
          cat > .env.production <<EOF
          VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
          VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
          VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
          VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
          VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
          VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
          VITE_NEIS_API_KEY=${VITE_NEIS_API_KEY}
          VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
          EOF
          echo "---- .env.production (keys only) ----"
          cut -d= -f1 .env.production

      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Verify dist exists
        script: |
          ls
          ls dist
          echo "---- dist/index.html ----"
          cat dist/index.html

      - name: Remove old ios folder
        script: |
          rm -rf ios

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Patch Info.plist with permission strings
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :NSCameraUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSPhotoLibraryUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSPhotoLibraryAddUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSLocationWhenInUseUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSMicrophoneUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" "$PLIST" 2>/dev/null || true

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string '사진 촬영과 QR 스캔 기능을 사용하기 위해 카메라 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string '스냅과 프로필에 사진을 첨부하기 위해 사진 라이브러리 접근 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string '저장한 스냅 이미지를 사진 앱에 보관하기 위해 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '주변 학교와 위치 기반 기능을 사용하기 위해 위치 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string '영상 촬영 시 음성 녹음을 위해 마이크 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" "$PLIST"

          echo "---- Patched Info.plist ----"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"

      - name: Show generated iOS structure
        script: |
          echo "ROOT"
          ls -la

          echo "IOS TREE"
          find ios

      - name: Verify project files
        script: |
          find ios -name "*.xcodeproj"
          find ios -name "*.xcworkspace"

      - name: Build unsigned app
        script: |
          cd ios/App

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        script: |
          mkdir -p Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          echo "APP_PATH=$APP_PATH"

          cp -R "$APP_PATH" Payload/

          zip -r OCL.ipa Payload

    artifacts:
      - OCL.ipa
