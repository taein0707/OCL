workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build Vite project
        script: |
          npm run build

      - name: Clean broken iOS folder (important)
        script: |
          rm -rf ios

      - name: Create fresh iOS platform on macOS
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Verify workspace exists
        script: |
          ls
          ls ios
          ls ios/App

      - name: Build unsigned iOS app
        script: |
          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA manually
        script: |
          mkdir -p Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          cp -R "$APP_PATH" Payload/

          zip -r OCL.ipa Payload

    artifacts:
      - OCL.ipa