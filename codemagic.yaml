workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build

    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Verify dist
        script: |
          ls dist

      - name: Remove old ios
        script: |
          rm -rf ios

      - name: Initialize Capacitor
        script: |
          npx cap init OCL com.ocl.app --web-dir=dist

      - name: Add iOS platform
        script: |
          npx cap add ios --verbose

      - name: Show generated structure
        script: |
          find ios

      - name: Install Pods manually
        script: |
          cd ios/App

          pod install --repo-update

      - name: Verify workspace
        script: |
          find ios -name "*.xcworkspace"

      - name: Build app
        script: |
          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        script: |
          mkdir Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          cp -R "$APP_PATH" Payload/

          zip -r OCL.ipa Payload

    artifacts:
      - OCL.ipa