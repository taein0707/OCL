workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build

    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v

      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Verify dist exists
        script: |
          ls
          ls dist

      - name: Remove old ios folder
        script: |
          rm -rf ios

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Show generated iOS structure
        script: |
          echo "ROOT"
          ls -la

          echo "IOS TREE"
          find ios

      - name: Verify Podfile
        script: |
          find ios -name Podfile

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Verify workspace
        script: |
          find ios -name "*.xcworkspace"

      - name: Build unsigned app
        script: |
          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        script: |
          mkdir -p Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          echo "APP_PATH=$APP_PATH"

          cp -R "$APP_PATH" Payload/

          zip -r OCL.ipa Payload

    artifacts:
      - OCL.ipa