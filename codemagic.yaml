workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build

    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Node version
        script: |
          node -v
          npm -v

      - name: Install dependencies
        script: |
          npm install

      - name: Capacitor doctor
        script: |
          npx cap doctor

      - name: Build web app
        script: |
          npm run build

      - name: Delete ios folder
        script: |
          rm -rf ios

      - name: Create iOS platform
        script: |
          npx cap add ios || exit 1

      - name: Sync Capacitor
        script: |
          npx cap sync ios || exit 1

      - name: Show iOS structure
        script: |
          echo "ROOT:"
          ls

          echo "IOS:"
          ls ios

          echo "IOS APP:"
          ls ios/App

      - name: Find Podfile
        script: |
          find . -name Podfile

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build unsigned app
        script: |
          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        script: |
          mkdir Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)

          echo $APP_PATH

          cp -R "$APP_PATH" Payload/

          zip -r OCL.ipa Payload

    artifacts:
      - OCL.ipa