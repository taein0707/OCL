workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS App
        script: |
          cd ios/App && xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -allowProvisioningUpdates -sdk iphoneos CODE_SIGNING_ALLOWED=NO build
    artifacts:
      - ios/App/build/Release-iphoneos/*.ipa
      - ios/App/build/Debug-iphoneos/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.ipa