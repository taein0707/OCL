workflows:
  ios-capacitor-workflow:
    name: OCL iOS Build

    instance_type: mac_mini_m1

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - ocl-firebase

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v

      - name: Write .env.production from Codemagic env
        script: |
          cat > .env.production <<EOF
          VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
          VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
          VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
          VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
          VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
          VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
          VITE_NEIS_API_KEY=${VITE_NEIS_API_KEY}
          VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
          EOF
          echo "---- .env.production generated successfully ----"

      - name: Install dependencies
        script: |
          npm ci

      - name: Build Web App (Vite)
        script: |
          npm run build

      - name: Sync Capacitor to iOS Platform
        script: |
          npx cap sync ios

      - name: Patch Info.plist (Permissions)
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string '프로필 및 게시글 사진 촬영을 위해 카메라 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string '저장한 스냅 이미지를 사진 앱에 보관하기 위해 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '주변 학교와 위치 기반 기능을 사용하기 위해 위치 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string '영상 촬영 시 음성 녹음을 위해 마이크 권한이 필요해요.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" "$PLIST"
          echo "---- Patched Info.plist ----"

      - name: Build unsigned app
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        script: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -1)
          cp -r "$APP_PATH" Payload/
          zip -r OCL.ipa Payload
          mkdir -p build/ios/ipa
          mv OCL.ipa build/ios/ipa/OCL.ipa

    artifacts:
      - build/ios/ipa/*.ipa